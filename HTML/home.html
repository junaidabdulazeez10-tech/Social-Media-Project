          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label for="recipient-name" class="col-form-label ">User-name:</label>
                <input type="text" class="form-control user-name-js input-css" id="recipient-name">
                <p class="text-danger usernameWrong"></p>
              </div>
              <div class="mb-3">
                <label for="message-text" class="col-form-label">Password:</label>
                <input type="password" class="form-control password-js input-css">
                <P class="text-danger passwordWrong"></P>
              </div>
            </form>
          </div>

            <button type="button" class="btn" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn login-submit-js">Log-in</button>
          </div>

        <div class="modal-body">

              <label for="recipient-name" class="col-form-label">Title</label>
              <input type="text" class="form-control title-post-js" id="recipient-name">
            </div>
            <div class="mb-3">
              <label for="message-text" class="col-form-label">Description</label>
              <input type="text" class="form-control description-post-js" id="message-text">
            </div>
          </form>
        </div>
        <div class="modal-footer">
