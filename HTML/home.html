<!DOCTYPE html>
<html>
<head>

  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">

  <link rel="stylesheet" href="../CSS/home.css">

 
  <title>Home Page</title>

</head>

<body>

  <!--Main Bar Starts Here-->
    <div class="container rounded col-11 d-flex flex-wrap align-items-center gap-2 mt-3 ">
    <div class="userNameLoggedIn-js">Tarmeez</div>
    <div class=" btn-link text-decoration-none">Home</div>
    <div class=" btn-link text-decoration-none">Profile</div>
    <div class="ms-auto gap-2 p-2 align-items-center loginDiv">
      <button data-bs-toggle="modal" data-bs-target="#exampleModal" class="btn fs-6 p-1">Log-in</button>
      <button data-bs-toggle="modal" data-bs-target="#registerModal" 
      class="btn fs-6 p-1">Register</button>
    </div>
    <div class="ms-auto p-2 align-items-center logoutDiv">
      <div style="margin-right: 5px;" class="name-user-js"></div>
      <div class="profile-picture-js" style="margin-right: 5px;"></div>
      <button class="btn fs-6 p-1 log-out-btn" onclick="loggedOut()">Log-out</button>
    </div>
    </div>
  <!--Main Bar Ends Here-->

  <!--Main Content Starts Here-->
    <div class="here-js">
    </div>
  <!--Main Content Ends Here-->

  
  <!--Login Modal starts here-->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5">Log-in</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label for="recipient-name" class="col-form-label ">User-name:</label>
                <input type="text" class="form-control user-name-js input-css" id="recipient-name">
                <p class="text-danger usernameWrong"></p>
              </div>
              <div class="mb-3">
                <label for="message-text" class="col-form-label">Password:</label>
                <input type="password" class="form-control password-js input-css">
                <P class="text-danger passwordWrong"></P>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn login-submit-js">Log-in</button>
          </div>
        </div>
      </div>
    </div>
  <!--Login Modal ends here-->


  <!-- Register Modal starts here -->
  <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">New message</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">=
              <label for="Name-name" class="col-form-label">Name:</label>
              <input type="text" class="form-control register-name-js">
            </div>
            <div class="mb-3">
              <label for="Username-name" class="col-form-label">Username:</label>
              <input type="text" class="form-control register-username-js">
            </div>
            <div class="mb-3">
              <label for="E-mail-name" class="col-form-label">E-mail:</label>
              <input type="email" class="form-control register-email-js">
            </div>
            <div class="mb-3">
              <label for="Password-name" class="col-form-label">Password:</label>
              <input type="password" class="form-control register-password-js">
            </div>
            <div class="mb-3">
              <label class="col-form-label">Profile-Picture: </label>
              <input type="file" class="form-control image-password-js image-password-css">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn log-out-btn" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn" onclick="register()">Register Here!</button>
        </div>
      </div>
    </div>
  </div>
<!-- Register Modal starts here -->


  <!--Create a post div starts here-->
    <div class="create-post-js create-post-css">
    </div>
  <!--Create a post div ends here--> 

  <!--This Modal is for the new posts button-->
  <div class="modal fade" id="exampleModal2" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel2">Create a new Post</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">
              <label for="recipient-name" class="col-form-label">Title</label>
              <input type="text" class="form-control title-post-js" id="recipient-name">
            </div>
            <div class="mb-3">
              <textarea name="Description: " class="description-post-js w-100 p-3"></textarea>
            </div>
            <div class="mb-3">
              <label>Add an image:</label>
              <input type="file" class="image-post-js">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button onclick="createNewPost()" type="button" class="btn btn-primary">Create Post</button>
        </div>
      </div>
    </div>
  </div>
  <!--//This Modal is for the new posts button//-->

   <script src="../node_modules/bootstrap/dist/js/bootstrap.min.js">
   </script>
   <script src="../node_modules/axios/dist/axios.min.js"></script>
   <script src="../JavaScript/home.js"></script>
   
   
</body>
</html>
